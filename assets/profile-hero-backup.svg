<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Moosphan profile hero backup</title>
  <desc id="desc">An editorial style profile banner for Moosphan with a dark grid background and highlighted focus areas.</desc>
  <defs>
    <linearGradient id="bg" x1="124" y1="64" x2="1108" y2="612" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1015"/>
      <stop offset="1" stop-color="#151B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="853" y1="118" x2="1132" y2="383" gradientUnits="userSpaceOnUse">
      <stop stop-color="#71E7D6"/>
      <stop offset="1" stop-color="#F2A65A"/>
    </linearGradient>
    <filter id="blur" x="689" y="24" width="495" height="479" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="52"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="28" fill="url(#bg)"/>
  <g opacity="0.26">
    <path d="M96 126H1184" stroke="#2A3642"/>
    <path d="M96 226H1184" stroke="#2A3642"/>
    <path d="M96 326H1184" stroke="#2A3642"/>
    <path d="M96 426H1184" stroke="#2A3642"/>
    <path d="M96 526H1184" stroke="#2A3642"/>
    <path d="M232 64V576" stroke="#2A3642"/>
    <path d="M432 64V576" stroke="#2A3642"/>
    <path d="M632 64V576" stroke="#2A3642"/>
    <path d="M832 64V576" stroke="#2A3642"/>
    <path d="M1032 64V576" stroke="#2A3642"/>
  </g>

  <g filter="url(#blur)" opacity="0.5">
    <circle cx="936" cy="212" r="143" fill="#71E7D6"/>
    <circle cx="1048" cy="306" r="108" fill="#F2A65A"/>
  </g>

  <rect x="84" y="86" width="268" height="38" rx="19" fill="#11161D" stroke="#263240"/>
  <circle cx="112" cy="105" r="6" fill="#71E7D6"/>
  <text x="130" y="111" fill="#D5DEE8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">builder / writer / toolmaker</text>

  <text x="84" y="212" fill="#F6F7F9" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="82" font-weight="700">Moosphan</text>
  <text x="88" y="267" fill="#A4B0BD" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28">Crafting AI-native writing systems and developer tools</text>
  <text x="88" y="307" fill="#A4B0BD" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28">with a foundation in Android product engineering</text>

  <rect x="84" y="370" width="324" height="150" rx="24" fill="#11161D" stroke="#273341"/>
  <text x="112" y="414" fill="#71E7D6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">current focus / 01</text>
  <text x="112" y="450" fill="#F6F7F9" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="600">long-form fiction systems</text>
  <text x="112" y="485" fill="#A4B0BD" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">canon control, chapter continuity,</text>
  <text x="112" y="511" fill="#A4B0BD" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">agent-guided drafting</text>

  <rect x="432" y="370" width="324" height="150" rx="24" fill="#11161D" stroke="#273341"/>
  <text x="460" y="414" fill="#71E7D6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">current focus / 02</text>
  <text x="460" y="450" fill="#F6F7F9" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="600">Codex and Claude skills</text>
  <text x="460" y="485" fill="#A4B0BD" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">repeatable workflows turned into</text>
  <text x="460" y="511" fill="#A4B0BD" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">reliable tools</text>

  <rect x="780" y="370" width="416" height="182" rx="24" fill="#121821" stroke="#273341"/>
  <rect x="808" y="398" width="112" height="30" rx="15" fill="url(#accent)"/>
  <text x="834" y="418" fill="#10161E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700">now shipping</text>
  <text x="808" y="457" fill="#F6F7F9" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="600">small sharp tools,</text>
  <text x="808" y="488" fill="#F6F7F9" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="600">not noisy platforms</text>
  <text x="808" y="514" fill="#A4B0BD" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">deterministic word counting, author workflows,</text>
  <text x="808" y="535" fill="#A4B0BD" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">and clean product surfaces</text>

  <circle cx="1118" cy="126" r="52" stroke="#71E7D6" stroke-width="2" opacity="0.7"/>
  <circle cx="1118" cy="126" r="73" stroke="#F2A65A" stroke-width="2" opacity="0.35"/>
  <path d="M1084 160L1152 92" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
</svg>
